<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Udayana Portal" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Udayana Portal | PIN untuk Koramil</title>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
    background: linear-gradient(135deg, #0a1525 0%, #071121 100%);
  }

  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    min-height: -webkit-fill-available;
    position: relative;
    color: white;
  }

  /* ===== HEADER ===== */
  .udayana-header {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    text-align: center;
    width: 100%;
    padding: 0 15px;
  }

  .udayana-logo {
    width: 100px;
    height: 100px;
    filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    transition: all 0.5s ease;
    animation: gentlePulse 3s infinite alternate;
  }

  @keyframes gentlePulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)); }
    100% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.6)); }
  }

  .udayana-title {
    color: #ffd700;
    font-size: 22px;
    font-weight: bold;
    margin-top: 8px;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
    letter-spacing: 2px;
  }

  @media (max-width: 768px) {
    .udayana-logo { width: 80px; height: 80px; }
    .udayana-title { font-size: 18px; }
  }
  @media (max-width: 480px) {
    .udayana-logo { width: 70px; height: 70px; }
    .udayana-title { font-size: 16px; }
  }

  /* ===== MAIN CONTAINER ===== */
  .main-container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 140px 20px 20px;
    position: relative;
    overflow-y: auto;
  }

  /* GRID 8 TOMBOL */
  .buttons-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
    padding-bottom: 20px;
  }

  @media (max-width: 900px) {
    .buttons-grid { grid-template-columns: repeat(3, 1fr); max-width: 700px; gap: 14px; }
  }
  @media (max-width: 600px) {
    .buttons-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 400px; }
    .main-container { padding: 120px 15px 15px; }
  }

  .portal-button {
    position: relative;
    cursor: pointer;
    border: none;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 140px;
    aspect-ratio: 1/1;
  }

  .logo-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255, 255, 255, 0.15);
    transition: all 0.3s ease;
  }

  .portal-button:hover .logo-container {
    transform: translateY(-8px) scale(1.05);
    border-color: rgba(255, 215, 0, 0.5);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.2);
  }

  .button-logo {
    width: 70px;
    height: 70px;
    object-fit: contain;
    margin-bottom: 10px;
  }

  .button-text {
    font-size: 14px;
    font-weight: bold;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    text-align: center;
  }

  @media (max-width: 768px) {
    .portal-button { min-height: 120px; }
    .button-logo { width: 60px; height: 60px; }
    .button-text { font-size: 12px; }
  }

  /* Control Buttons */
  .control-buttons {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
    z-index: 1000;
  }
  .control-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 215, 0, 0.2);
    border: 2px solid rgba(255, 215, 0, 0.5);
    color: #ffd700;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .control-btn:hover { transform: scale(1.1); background: rgba(255, 215, 0, 0.3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0, 0, 0, 0.8);
    color: #ffd700;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 215, 0, 0.3);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  /* Loading Overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #0a1525 0%, #071121 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
    gap: 25px;
    transition: opacity 0.5s ease;
  }
  .loading-overlay.hidden { opacity: 0; visibility: hidden; }
  .loading-logo { width: 120px; height: 120px; filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8)); animation: gentlePulse 2s infinite alternate; }
  .status-bar { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
  .status-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 0.3s ease; }

  /* ===== PIN MODAL KHUSUS KORAMIL ===== */
  .pin-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    z-index: 20000;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  .pin-modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .pin-modal {
    background: linear-gradient(145deg, #1a2635, #0f1a2a);
    border-radius: 48px;
    padding: 35px 30px;
    text-align: center;
    border: 2px solid rgba(255, 215, 0, 0.5);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
    width: 90%;
    max-width: 380px;
    transform: scale(0.9);
    transition: transform 0.3s ease;
  }
  .pin-modal-overlay.show .pin-modal {
    transform: scale(1);
  }
  .pin-icon {
    font-size: 60px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6));
  }
  .pin-title-modal {
    color: #ffd700;
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .pin-sub-modal {
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    margin-bottom: 25px;
  }
  .pin-input-field {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 215, 0, 0.4);
    border-radius: 60px;
    padding: 16px 20px;
    width: 100%;
    font-size: 28px;
    text-align: center;
    letter-spacing: 8px;
    color: #ffd700;
    font-weight: bold;
    outline: none;
    font-family: monospace;
    margin-bottom: 20px;
  }
  .pin-input-field:focus {
    border-color: #ffd700;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  }
  .pin-numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .numpad-key {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 60px;
    padding: 14px;
    font-size: 24px;
    font-weight: bold;
    color: #ffd700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .numpad-key:active { transform: scale(0.95); background: rgba(255, 215, 0, 0.2); }
  .pin-modal-btn {
    background: linear-gradient(145deg, #ffd700, #ff8c00);
    border: none;
    padding: 14px 20px;
    border-radius: 60px;
    font-size: 18px;
    font-weight: bold;
    color: #000;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: all 0.3s ease;
  }
  .pin-modal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5); }
  .pin-error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    min-height: 36px;
  }
  .pin-close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: all 0.2s;
  }
  .pin-close:hover { color: #ffd700; transform: scale(1.1); }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Lambang_Kodam_Udayana.svg" alt="Udayana" class="loading-logo">
  <div class="status-bar"><div class="status-progress" id="statusProgress"></div></div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<!-- PIN MODAL KHUSUS KORAMIL -->
<div class="pin-modal-overlay" id="pinModalOverlay">
  <div class="pin-modal">
    <div class="pin-close" id="pinCloseBtn">&times;</div>
    <div class="pin-icon">🔐</div>
    <div class="pin-title-modal">KORAMIL</div>
    <div class="pin-sub-modal">Masukkan PIN untuk mengakses</div>
    <input type="password" id="koramilPinInput" class="pin-input-field" maxlength="3" inputmode="numeric" placeholder="***">
    <div class="pin-numpad" id="koramilNumpad">
      <button class="numpad-key" data-num="1">1</button>
      <button class="numpad-key" data-num="2">2</button>
      <button class="numpad-key" data-num="3">3</button>
      <button class="numpad-key" data-num="4">4</button>
      <button class="numpad-key" data-num="5">5</button>
      <button class="numpad-key" data-num="6">6</button>
      <button class="numpad-key" data-num="7">7</button>
      <button class="numpad-key" data-num="8">8</button>
      <button class="numpad-key" data-num="9">9</button>
      <button class="numpad-key" data-num="clear">⌫</button>
      <button class="numpad-key" data-num="0">0</button>
      <button class="numpad-key" data-num="enter">✓</button>
    </div>
    <button class="pin-modal-btn" id="pinConfirmBtn">VERIFIKASI</button>
    <div class="pin-error-msg" id="pinErrorMsg"></div>
  </div>
</div>

<!-- Header -->
<div class="udayana-header">
  <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Lambang_Kodam_Udayana.svg" alt="Lambang Kodam Udayana" class="udayana-logo">
  <div class="udayana-title">UDAYANA PORTAL</div>
</div>

<!-- Control Buttons -->
<div class="control-buttons">
  <button class="control-btn" id="infoBtn">ⓘ</button>
  <button class="control-btn" id="fullscreenBtn">⛶</button>
</div>

<!-- Main Container dengan 8 Tombol -->
<div class="main-container" id="mainContainer">
  <div class="buttons-grid">
    <!-- PREVIEW PURA (langsung) -->
    <button class="portal-button" id="btnPreviewPura">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">🛕</div>
        <span class="button-text">PREVIEW PURA</span>
      </div>
    </button>
    
    <!-- KORAMIL (BUTTON DENGAN PIN) -->
    <button class="portal-button" id="btnKoramil">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">🏛️</div>
        <span class="button-text">KORAMIL 🔒</span>
      </div>
    </button>
    
    <!-- DUKOPS -->
    <button class="portal-button" id="btnDukops">
      <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/25/Lambang_Kodam_Udayana.svg" alt="DUKOPS" class="button-logo">
        <span class="button-text">DUKOPS</span>
      </div>
    </button>
    
    <!-- SHOW LPST05 -->
    <button class="portal-button" id="btnShow">
      <div class="logo-container">
        <img src="https://raw.githubusercontent.com/Koramil05/JADWAL/main/LOGO%20KOREM163%20Wirasatya.png" alt="SHOW" class="button-logo">
        <span class="button-text">SHOW</span>
      </div>
    </button>
    
    <!-- GOOGLE DRIVE -->
    <button class="portal-button" id="btnDrive">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">📁</div>
        <span class="button-text">GOOGLE DRIVE</span>
      </div>
    </button>
    
    <!-- PEMETAAN LAHAN -->
    <button class="portal-button" id="btnPemetaan">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">🗺️</div>
        <span class="button-text">PEMETAAN LAHAN</span>
      </div>
    </button>
    
    <!-- PORTAL KDKMP -->
    <button class="portal-button" id="btnPortal">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">🌐</div>
        <span class="button-text">PORTAL KDKMP</span>
      </div>
    </button>
    
    <!-- DAPERS (RH) -->
    <button class="portal-button" id="btnDapers">
      <div class="logo-container">
        <div class="button-logo" style="font-size: 50px; display: flex; align-items: center; justify-content: center;">⭐</div>
        <span class="button-text">DAPERS</span>
      </div>
    </button>
  </div>
</div>

<script>
// KONFIGURASI URL
const URLS = {
  previewPura: "https://koramil05.github.io/previewpura/",
  koramil: "https://koramil05.github.io/PURA-KORAMIL/",
  dukops: "https://koramil05.github.io/DUKOPS/",
  show: "https://koramil05.github.io/LPST05/",
  drive: "https://drive.google.com/drive/folders/1I5wVeLcrSS2sjlaRLCftwd9JPfbNri0l",
  pemetaan: "https://pemetaan-lahan.portalkdkmp.id",
  portal: "https://portalkdkmp.id/",
  dapers: "https://koramil05.github.io/RH/"
};

const KORAMIL_PIN = "321";

// DOM Elements
const loadingOverlay = document.getElementById('loadingOverlay');
const statusProgress = document.getElementById('statusProgress');
const toast = document.getElementById('toast');
const infoBtn = document.getElementById('infoBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');

// PIN Modal Elements
const pinModalOverlay = document.getElementById('pinModalOverlay');
const koramilPinInput = document.getElementById('koramilPinInput');
const pinErrorMsg = document.getElementById('pinErrorMsg');
const pinConfirmBtn = document.getElementById('pinConfirmBtn');
const pinCloseBtn = document.getElementById('pinCloseBtn');

let pendingKoramilUrl = null;

function showToastMessage(message, duration = 3000) {
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function updateLoadingProgress(percent) {
  statusProgress.style.width = `${percent}%`;
}

// Buka URL dengan efek loading ringan
function openUrl(url, name) {
  showToastMessage(`Membuka ${name}...`);
  setTimeout(() => {
    window.open(url, '_blank', 'noopener,noreferrer');
  }, 200);
}

// PIN Modal Functions
function showPinModal() {
  koramilPinInput.value = '';
  pinErrorMsg.textContent = '';
  pinModalOverlay.classList.add('show');
  koramilPinInput.focus();
  pendingKoramilUrl = URLS.koramil;
}

function hidePinModal() {
  pinModalOverlay.classList.remove('show');
  pendingKoramilUrl = null;
}

function verifyPinAndOpen() {
  const enteredPin = koramilPinInput.value.trim();
  if (enteredPin === KORAMIL_PIN) {
    hidePinModal();
    openUrl(URLS.koramil, "KORAMIL");
    showToastMessage("✅ PIN benar! Mengakses Koramil...", 2000);
  } else {
    pinErrorMsg.textContent = "❌ PIN salah! Akses ditolak.";
    koramilPinInput.value = '';
    koramilPinInput.style.borderColor = '#ff6b6b';
    setTimeout(() => {
      koramilPinInput.style.borderColor = 'rgba(255, 215, 0, 0.4)';
    }, 500);
    koramilPinInput.focus();
  }
}

// Setup Numpad untuk PIN Modal
function setupKoramilNumpad() {
  const numpadBtns = document.querySelectorAll('#koramilNumpad .numpad-key');
  numpadBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const num = btn.getAttribute('data-num');
      if (num === 'clear') {
        koramilPinInput.value = koramilPinInput.value.slice(0, -1);
      } else if (num === 'enter') {
        verifyPinAndOpen();
      } else {
        if (koramilPinInput.value.length < 3) {
          koramilPinInput.value += num;
        }
      }
      pinErrorMsg.textContent = '';
    });
  });
  
  koramilPinInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      verifyPinAndOpen();
    }
  });
  
  koramilPinInput.addEventListener('input', (e) => {
    koramilPinInput.value = koramilPinInput.value.replace(/[^0-9]/g, '').slice(0, 3);
  });
}

// Setup semua tombol portal
function setupButtons() {
  // Preview Pura (langsung tanpa PIN)
  const btnPreview = document.getElementById('btnPreviewPura');
  btnPreview.addEventListener('click', () => {
    const container = btnPreview.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.previewPura, "PREVIEW PURA");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // KORAMIL - BUKA PIN MODAL
  const btnKoramil = document.getElementById('btnKoramil');
  btnKoramil.addEventListener('click', () => {
    const container = btnKoramil.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    setTimeout(() => { container.style.transform = ''; }, 300);
    showPinModal();
  });
  
  // DUKOPS
  const btnDukops = document.getElementById('btnDukops');
  btnDukops.addEventListener('click', () => {
    const container = btnDukops.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.dukops, "DUKOPS");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // SHOW
  const btnShow = document.getElementById('btnShow');
  btnShow.addEventListener('click', () => {
    const container = btnShow.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.show, "SHOW");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // GOOGLE DRIVE
  const btnDrive = document.getElementById('btnDrive');
  btnDrive.addEventListener('click', () => {
    const container = btnDrive.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.drive, "GOOGLE DRIVE");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // PEMETAAN LAHAN
  const btnPemetaan = document.getElementById('btnPemetaan');
  btnPemetaan.addEventListener('click', () => {
    const container = btnPemetaan.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.pemetaan, "PEMETAAN LAHAN");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // PORTAL KDKMP
  const btnPortal = document.getElementById('btnPortal');
  btnPortal.addEventListener('click', () => {
    const container = btnPortal.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.portal, "PORTAL KDKMP");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
  
  // DAPERS
  const btnDapers = document.getElementById('btnDapers');
  btnDapers.addEventListener('click', () => {
    const container = btnDapers.querySelector('.logo-container');
    container.style.transform = 'scale(0.95)';
    openUrl(URLS.dapers, "DAPERS");
    setTimeout(() => { container.style.transform = ''; }, 300);
  });
}

// Control Buttons
function setupControls() {
  infoBtn.addEventListener('click', () => {
    showToastMessage('UDAYANA PORTAL v2.7 | Tombol KORAMIL menggunakan PIN: 321', 5000);
  });
  
  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      fullscreenBtn.innerHTML = '✕';
    } else {
      document.exitFullscreen();
      fullscreenBtn.innerHTML = '⛶';
    }
  });
}

// Initialize App with Loading
function initializeApp() {
  console.log('🚀 Udayana Portal - PIN hanya untuk tombol KORAMIL (321)');
  
  let progress = 0;
  const loadingInterval = setInterval(() => {
    progress += Math.random() * 20 + 10;
    if (progress > 100) progress = 100;
    updateLoadingProgress(progress);
    if (progress >= 100) {
      clearInterval(loadingInterval);
      setTimeout(() => {
        loadingOverlay.classList.add('hidden');
        showToastMessage('Portal siap! Klik KORAMIL dan masukkan PIN 321', 3000);
      }, 500);
    }
  }, 150);
  
  setupKoramilNumpad();
  setupButtons();
  setupControls();
  
  // Event untuk close modal
  pinCloseBtn.addEventListener('click', hidePinModal);
  pinConfirmBtn.addEventListener('click', verifyPinAndOpen);
  pinModalOverlay.addEventListener('click', (e) => {
    if (e.target === pinModalOverlay) hidePinModal();
  });
}

// Start
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeApp);
} else {
  initializeApp();
}

// Fullscreen change event
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) fullscreenBtn.innerHTML = '✕';
  else fullscreenBtn.innerHTML = '⛶';
});
</script>
</body>
</html>
