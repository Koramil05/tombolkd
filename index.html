<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;

  body {

  .udayana-header {

  .main-container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 140px 20px 20px;
    position: relative;
    overflow-y: auto;
  }

  .buttons-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
    padding-bottom: 20px;
  }

  @media (max-width: 900px) {
    .buttons-grid { grid-template-columns: repeat(3, 1fr); max-width: 700px; }

  .portal-button {

    aspect-ratio: 1/1;
  }

    display: flex;

  @media (max-width: 768px) {
    .portal-button { min-height: 120px; }

    right: 20px;

  .control-btn {
    width: 48px;

  .toast {

  .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

  .loading-overlay {
    position: fixed;
    inset: 0;

    align-items: center;

  .status-bar { width: 200px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }

  /* UPDATE MODAL */

    inset: 0;
    background: rgba(0, 0, 0, 0.85);

    visibility: hidden;
    transition: all 0.3s ease;

    justify-content: center;

  /* PIN MODAL KHUSUS KORAMIL */
  .pin-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);

    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;

  .pin-modal-overlay.show { opacity: 1; visibility: visible; }
  .pin-modal {
    background: linear-gradient(145deg, #1a2635, #0f1a2a);
    border-radius: 48px;
    padding: 35px 30px;
    text-align: center;
    border: 2px solid rgba(255, 215, 0, 0.5);

    transform: scale(0.9);

  .pin-numpad {

</style>

<script>
// KONFIGURASI
const APP_VERSION = "2.8.0";
const VERSION_CHECK_URL = "https://koramil05.github.io/version.json"; // version.json di GitHub
const UPDATE_PAGE_URL = window.location.href; // refresh page untuk update

const URLS = {
  previewPura: "https://koramil05.github.io/previewpura/",
  koramil: "https://koramil05.github.io/PURA-KORAMIL/",
  dukops: "https://koramil05.github.io/DUKOPS/",
  show: "https://koramil05.github.io/LPST05/",
  drive: "https://drive.google.com/drive/folders/1I5wVeLcrSS2sjlaRLCftwd9JPfbNri0l",
  pemetaan: "https://pemetaan-lahan.portalkdkmp.id",
  portal: "https://portalkdkmp.id/",
  dapers: "https://koramil05.github.io/RH/"
};

const KORAMIL_PIN = "321";

let updateData = null;
let swRegistration = null;

// DOM Elements
const loadingOverlay = document.getElementById('loadingOverlay');
const statusProgress = document.getElementById('statusProgress');
const toast = document.getElementById('toast');
const versionBadge = document.getElementById('versionBadge');
const updateOverlay = document.getElementById('updateOverlay');
const laterBtn = document.getElementById('laterBtn');
const updateNowBtn = document.getElementById('updateNowBtn');
const checkUpdateBtn = document.getElementById('checkUpdateBtn');

function showToastMessage(msg, duration=3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function updateLoadingProgress(percent) {
  statusProgress.style.width = `${percent}%`;
}

function openUrl(url, name) {
  showToastMessage(`Membuka ${name}...`);
  setTimeout(() => window.open(url, '_blank', 'noopener,noreferrer'), 150);
}

// ========== UPDATE SYSTEM DARI GITHUB ==========
async function checkForUpdates(showNotification = false) {
  try {
    const response = await fetch(VERSION_CHECK_URL, { cache: 'no-cache' });
    if (!response.ok) throw new Error('Gagal cek versi');
    const data = await response.json();
    
    if (data.version && data.version !== APP_VERSION) {
      updateData = data;
      showUpdateModal(data);
      if (showNotification) showToastMessage(`Update tersedia! v${data.version}`, 4000);
      return true;
    } else {
      if (showNotification) showToastMessage(`Aplikasi sudah versi terbaru (${APP_VERSION})`, 2000);
      return false;
    }
  } catch (error) {
    console.log('Cek update gagal:', error);
    if (showNotification) showToastMessage('Gagal mengecek update, coba lagi nanti', 2000);
    return false;
  }
}

function showUpdateModal(data) {
  const newVersionLabel = document.getElementById('newVersionLabel');
  const changelogContent = document.getElementById('changelogContent');
  newVersionLabel.textContent = `v${data.version}`;
  
  if (data.changelog && data.changelog.length) {
    changelogContent.innerHTML = data.changelog.map(item => `<div class="changelog-item">${item}</div>`).join('');
  } else {
    changelogContent.innerHTML = '<div class="changelog-item">✨ Pembaruan terbaru dari server</div><div class="changelog-item">🔄 Segera update untuk fitur terbaik</div>';
  }
  
  updateOverlay.classList.add('show');
}

function hideUpdateModal() {
  updateOverlay.classList.remove('show');
  document.getElementById('updateProgressDiv').classList.remove('show');
  document.getElementById('updateButtons').style.display = 'flex';
}

function performUpdate() {
  document.getElementById('updateButtons').style.display = 'none';
  const progressDiv = document.getElementById('updateProgressDiv');
  progressDiv.classList.add('show');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15 + 5;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      progressFill.style.width = '100%';
      progressText.textContent = 'Update siap! Memuat ulang...';
      setTimeout(() => {
        // Clear cache dan reload
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
        }
        localStorage.setItem('appVersion', updateData?.version || APP_VERSION);
        window.location.reload();
      }, 1500);
    }
    progressFill.style.width = `${progress}%`;
    progressText.textContent = `Mengunduh update... ${Math.floor(progress)}%`;
  }, 80);
}

// Register Service Worker untuk cache busting
async function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    try {
      const swCode = `
        const CACHE_NAME = 'udayana-portal-${APP_VERSION}';
        self.addEventListener('install', e => { self.skipWaiting(); });
        self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
        self.addEventListener('fetch', e => {
          e.respondWith(fetch(e.request).catch(() => new Response('Offline mode', {headers:{'Content-Type':'text/html'}})));
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      const registration = await navigator.serviceWorker.register(swUrl);
      swRegistration = registration;
      return registration;
    } catch (error) { console.log('SW failed:', error); }
  }
  return null;
}

// ========== PIN MODAL KORAMIL ==========
function setupPinModal() {
  const pinModal = document.getElementById('pinModalOverlay');
  const pinInput = document.getElementById('koramilPinInput');
  const pinError = document.getElementById('pinErrorMsg');
  const closeBtn = document.getElementById('pinCloseBtn');
  const confirmBtn = document.getElementById('pinConfirmBtn');
  
  function showPinModal() { pinModal.classList.add('show'); pinInput.focus(); }
  function hidePinModal() { pinModal.classList.remove('show'); pinInput.value = ''; pinError.textContent = ''; }
  function verifyPin() {
    if (pinInput.value.trim() === KORAMIL_PIN) {
      hidePinModal();
      openUrl(URLS.koramil, "KORAMIL");
    } else {
      pinError.textContent = '❌ PIN salah! Akses ditolak.';
      pinInput.value = '';
      pinInput.focus();
    }
  }
  
  // Numpad
  document.querySelectorAll('#koramilNumpad .numpad-key').forEach(btn => {
    btn.addEventListener('click', () => {
      const num = btn.getAttribute('data-num');
      if (num === 'clear') pinInput.value = pinInput.value.slice(0, -1);
      else if (num === 'enter') verifyPin();
      else if (pinInput.value.length < 3) pinInput.value += num;
      pinError.textContent = '';
    });
  });
  pinInput.addEventListener('keypress', e => { if(e.key === 'Enter') verifyPin(); });
  pinInput.addEventListener('input', e => { pinInput.value = pinInput.value.replace(/[^0-9]/g, '').slice(0,3); });
  closeBtn.addEventListener('click', hidePinModal);
  confirmBtn.addEventListener('click', verifyPin);
  pinModal.addEventListener('click', e => { if(e.target === pinModal) hidePinModal(); });
  
  return { showPinModal };
}

// ========== SETUP TOMBOL ==========
function setupButtons(pinModalShow) {
  const buttons = [
    { id: 'btnPreviewPura', url: URLS.previewPura, name: 'PREVIEW KAS PURA', needPin: false },
    { id: 'btnKoramil', url: URLS.koramil, name: 'KORAMIL', needPin: true },
    { id: 'btnDukops', url: URLS.dukops, name: 'DUKOPS', needPin: false },
    { id: 'btnShow', url: URLS.show, name: 'SHOW', needPin: false },
    { id: 'btnDrive', url: URLS.drive, name: 'GOOGLE DRIVE', needPin: false },
    { id: 'btnPemetaan', url: URLS.pemetaan, name: 'PEMETAAN LAHAN', needPin: false },
    { id: 'btnPortal', url: URLS.portal, name: 'PORTAL KDKMP', needPin: false },
    { id: 'btnDapers', url: URLS.dapers, name: 'DAPERS', needPin: false }
  ];
  
  buttons.forEach(btn => {
    const element = document.getElementById(btn.id);
    if (element) {
      element.addEventListener('click', (e) => {
        const container = element.querySelector('.logo-container');
        container.style.transform = 'scale(0.95)';
        setTimeout(() => { container.style.transform = ''; }, 300);
        if (btn.needPin) {
          pinModalShow();
        } else {
          openUrl(btn.url, btn.name);
        }
      });
    }
  });
}

// ========== CONTROL BUTTONS ==========
function setupControls() {
  document.getElementById('infoBtn').addEventListener('click', () => {
    showToastMessage(`UDAYANA PORTAL v${APP_VERSION} | PIN Koramil: 321 | Auto update dari GitHub`, 5000);
  });
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      document.getElementById('fullscreenBtn').innerHTML = '✕';
    } else {
      document.exitFullscreen();
      document.getElementById('fullscreenBtn').innerHTML = '⛶';
    }
  });
  checkUpdateBtn.addEventListener('click', () => checkForUpdates(true));
  laterBtn.addEventListener('click', () => hideUpdateModal());
  updateNowBtn.addEventListener('click', () => performUpdate());
}

// ========== INITIALIZE ==========
async function initializeApp() {
  versionBadge.textContent = `v${APP_VERSION}`;
  
  let progress = 0;
  const loadingInterval = setInterval(() => {
    progress += Math.random() * 20 + 10;
    if (progress > 100) progress = 100;
    updateLoadingProgress(progress);
    if (progress >= 100) {
      clearInterval(loadingInterval);
      setTimeout(() => {
        loadingOverlay.classList.add('hidden');
        showToastMessage(`Portal siap | v${APP_VERSION} | Update otomatis aktif`, 3000);
      }, 500);
    }
  }, 150);
  
  await registerServiceWorker();
  const pinModal = setupPinModal();
  setupButtons(() => pinModal.showPinModal());
  setupControls();
  
  // Cek update setelah loading (delay 3 detik)
  setTimeout(() => {
    checkForUpdates(false);
    // Cek update setiap 30 menit
    setInterval(() => checkForUpdates(false), 30 * 60 * 1000);
  }, 3000);
}

// Start
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initializeApp);
else initializeApp();

document.addEventListener('fullscreenchange', () => {
  const fsBtn = document.getElementById('fullscreenBtn');
  if (document.fullscreenElement) fsBtn.innerHTML = '✕';
  else fsBtn.innerHTML = '⛶';
});
</script>
</body>
